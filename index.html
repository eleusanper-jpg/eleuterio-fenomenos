<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FENÓMENOS – Set List</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #fff; font-family: Arial, sans-serif; padding: 16px; max-width: 680px; margin: 0 auto; }
  h1 { text-align: center; color: #e94560; font-size: 24px; letter-spacing: 2px; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #aaaacc; font-size: 12px; margin-bottom: 16px; }
  input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #0f3460; color: #fff; font-size: 14px; margin-bottom: 10px; }
  input::placeholder { color: #667; }
  .hint { font-size: 11px; color: #666; text-align: center; margin-bottom: 10px; }
  .song-row { display: flex; align-items: center; gap: 6px; border-radius: 9px; margin-bottom: 5px; padding: 9px 10px; border: 2px solid transparent; cursor: grab; touch-action: none; transition: background 0.15s; }
  .song-row.even { background: #16213e; }
  .song-row.odd  { background: #0d1b3e; }
  .song-row.dragging { opacity: 0.4; background: #e94560; }
  .song-row.over { border: 2px dashed #e94560; background: #1a4a7a; }
  .num { min-width: 24px; font-size: 14px; font-weight: bold; color: #e94560; text-align: right; }
  .handle { font-size: 18px; color: #555; padding: 0 2px; cursor: grab; }
  .info { flex: 1; overflow: hidden; }
  .info .name { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info .meta { font-size: 11px; color: #8899bb; margin-top: 1px; }
  .arrows { display: flex; flex-direction: column; gap: 1px; }
  .arrows button { background: none; border: none; color: #999; cursor: pointer; font-size: 13px; padding: 1px 4px; line-height: 1; }
  .arrows button:disabled { color: #333; cursor: default; }
  .btn-audio { background: #0f3460; color: #fff; border: 1px solid #e94560; border-radius: 6px; padding: 5px 9px; font-size: 11px; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
  .btn-noaudio { background: #222; color: #555; border: 1px solid #333; border-radius: 6px; padding: 5px 9px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-copy { flex: 1; padding: 12px; background: #0f3460; color: #fff; border: 1px solid #e94560; border-radius: 10px; font-size: 13px; cursor: pointer; }
  .btn-export { flex: 1; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; font-weight: bold; }
  .ok { margin-top: 10px; text-align: center; color: #4cff91; font-size: 13px; font-weight: bold; display: none; }
  footer { margin-top: 16px; font-size: 10px; color: #444; text-align: center; }
</style>
</head>
<body>

<h1>🎸 FENÓMENOS</h1>
<div class="subtitle" id="subtitle">20 temas · calculando duración...</div>

<input type="text" id="memberName" placeholder="Tu nombre (ej: Eleuterio)">
<div class="hint">📱 Arrastra con el dedo · 💻 Arrastra con el ratón · ↕ usa las flechas</div>

<div id="list"></div>

<div class="actions">
  <button class="btn-copy" onclick="copyText()">📋 Copiar como texto</button>
  <button class="btn-export" onclick="exportImg()">📷 Exportar PNG</button>
</div>
<div class="ok" id="ok">✅ ¡Listo!</div>
<footer>Fenómenos · Set List Manager</footer>

<script>
const SONGS = [
  { id:1,  title:"INTRO REBEL YELL",              bpm:170, duration:"4:49",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/ENSAYOS/ENSAYANDO/ytmp3free.cc_billy-idol-rebel-yell-live-youtubemp3free.org.mp3" },
  { id:2,  title:"MEDL BRUNO MARS",                bpm:178, duration:"11:26", url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Medleys/PROPUESTAS%20DE%20MEDLEYS%20ESCUCHAR%20-20251016T174828Z-1-001/BRUNO%20MARS%20RED%20HOT%20CHILI%20PEPER_.mp3" },
  { id:3,  title:"MEDL ROCK BORN TO",              bpm:140, duration:"12:33", url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/ENSAYOS/ENSAYANDO/rock%20medley%20rock%20born%20to%20be%20%5eMsatisfaction%5eM%20OTROS%5eM%20lenny%20kratitz%20TONOS%20OK.mp3" },
  { id:4,  title:"MEDL JUMP + FINAL COU",          bpm:129, duration:"9:01",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/ENSAYOS/ENSAYANDO/MEDLEY-JUMP-FINAL-C-EASY-LOVER-FINAL-FINAL-01.mp3" },
  { id:5,  title:"FENÓMENO LATIN ROCK",            bpm:150, duration:"7:00",  url:"https://1drv.ms/u/c/412e066b10cb09f5/IQCYZ8DCm0A5TaBk4Wa7KgodAZkr5uLdE7J6fYTG0ngEcLs?e=JwIglZ" },
  { id:6,  title:"SEVEN NATIONS",                  bpm:123, duration:"3:58",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/ENSAYOS/ENSAYANDO/The%20White%20Stripes%20-%20Seven%20Nation%20Army%20(Official%20Music%20Video).mp3" },
  { id:7,  title:"DISCO POP STREET BOYS",          bpm:null,duration:"6:31",  url:null },
  { id:8,  title:"IN THE END / FUNK",              bpm:105, duration:"3:29",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Temas%20enteros/IN%20THE%20END%20LINKIN%20FUNCY.mp3" },
  { id:9,  title:"GOLDEN / ATP",                   bpm:105, duration:"6:02",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Medleys/PARA%20INCORPORAR/GOLDEN%5eMUSHER.mp3" },
  { id:10, title:"I'M STILL STANDING + SATURDAY",  bpm:null,duration:"6:30",  url:"https://1drv.ms/u/c/412e066b10cb09f5/IQD-r6JK8qrgQ7eEz5PQbY5xAddLYTFUo6riQvYa2P_19Jk?e=5bJzSH" },
  { id:11, title:"MARC MARTEL - QUEEN MEDLEY",     bpm:null,duration:"6:11",  url:"https://1drv.ms/u/c/412e066b10cb09f5/IQBrtDC-Z86YR6-spqSyPrqYASI4YJwXgXRzZp2grwonLHE?e=lhyKeW" },
  { id:12, title:"OREJA – PUEDES CONT",            bpm:143, duration:"7:27",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Medleys/PROPUESTAS%20DE%20MEDLEYS%20ESCUCHAR%20-20251016T174828Z-1-001/OREJA-%20PUEDES%20CONTAR%5eMINMORTAL%5eJ%2020%20ENERO%5eJ%20LA%20NIÑA.mp3" },
  { id:13, title:"PEREZA-LALA-TENÍA",              bpm:128, duration:"10:08", url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/ENSAYOS/ENSAYANDO/Pereza%5eMLalala%5eMTenia%20Tanto%20que%20darte.mp3" },
  { id:14, title:"EL BIEN-BESOS-ZAPATO",           bpm:null,duration:"6:30",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Medleys/PARA%20INCORPORAR/MEDLEY%20EL%20BIEN-BESOS-ZAPATILLAS.mp3" },
  { id:15, title:"INSOPORT-EL SOL",                bpm:null,duration:"13:30", url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Medleys/PARA%20INCORPORAR/MEDLEY%20INSOPORTABLE-EL%20SOL%20NO%5e%5e.1.mp3" },
  { id:16, title:"A QUIEN L / VIVIR / MI GRAN",    bpm:null,duration:"7:11",  url:"https://d.docs.live.net/412e066b10cb09f5/Socorro%20se%20fue%20de%20fiesta/REPERTORIO/BACKINGS/Medleys/PARA%20INCORPORAR/A%20QUIEN%20LE%20IMPORTA-VIVIR%20ASI%20ES%20MORIR%20DE%20AMOR-MI%20GRAN%20NOCHE-ME%20COLE%20EN%20UNA%20FIESTA.mp3" },
  { id:17, title:"MICHAEL JACKSON MEDLEY",         bpm:null,duration:"7:10",  url:null },
  { id:18, title:"MEDLEY ROCK CATALÀ",             bpm:null,duration:"10:00", url:null },
  { id:19, title:"TINA TURNER - THE BEST",         bpm:null,duration:"4:10",  url:null },
  { id:20, title:"ACDC + SWEET CHILD",             bpm:null,duration:"9:52",  url:null },
];

let songs = [...SONGS];
let dragSrc = null, touchSrc = null, overIdx = null;

function totalDur(list) {
  let t = 0;
  list.forEach(s => {
    if (!s.duration || s.duration === "—") return;
    const [m, sec] = s.duration.split(":").map(Number);
    t += m * 60 + (sec || 0);
  });
  return `${Math.floor(t/60)}m ${String(t%60).padStart(2,"0")}s`;
}

function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";
  document.getElementById("subtitle").textContent = `${songs.length} temas · ${totalDur(songs)} totales`;
  songs.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "song-row " + (i % 2 === 0 ? "even" : "odd");
    row.draggable = true;
    row.dataset.idx = i;

    row.innerHTML = `
      <div class="num">${i+1}</div>
      <div class="handle">⠿</div>
      <div class="info">
        <div class="name">${s.title}</div>
        <div class="meta">${s.bpm ? s.bpm+" BPM" : "— BPM"} · ${s.duration}</div>
      </div>
      <div class="arrows">
        <button onclick="moveUp(${i})" ${i===0?"disabled":""}>▲</button>
        <button onclick="moveDown(${i})" ${i===songs.length-1?"disabled":""}>▼</button>
      </div>
      ${s.url
        ? `<a class="btn-audio" href="${s.url}" target="_blank">▶ Escuchar</a>`
        : `<span class="btn-noaudio">Sin audio</span>`}
    `;

    row.addEventListener("dragstart", () => { dragSrc = i; row.classList.add("dragging"); });
    row.addEventListener("dragend",   () => { dragSrc = null; overIdx = null; render(); });
    row.addEventListener("dragenter", () => { overIdx = i; });
    row.addEventListener("dragover",  e => e.preventDefault());
    row.addEventListener("drop",      () => { if (dragSrc !== null && dragSrc !== i) { reorder(dragSrc, i); } });

    row.addEventListener("touchstart", e => { touchSrc = i; }, { passive: true });
    row.addEventListener("touchend",   () => {
      if (touchSrc !== null && overIdx !== null && touchSrc !== overIdx) reorder(touchSrc, overIdx);
      touchSrc = null; overIdx = null;
    });

    el.appendChild(row);
  });
}

document.addEventListener("touchmove", e => {
  if (touchSrc === null) return;
  const y = e.touches[0].clientY;
  document.querySelectorAll(".song-row").forEach((el, idx) => {
    const r = el.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom) overIdx = idx;
  });
}, { passive: true });

function reorder(from, to) {
  const updated = [...songs];
  const [moved] = updated.splice(from, 1);
  updated.splice(to, 0, moved);
  songs = updated;
  render();
}

function moveUp(i) { if (i > 0) reorder(i, i-1); }
function moveDown(i) { if (i < songs.length-1) reorder(i, i+1); }

function showOk() {
  const ok = document.getElementById("ok");
  ok.style.display = "block";
  setTimeout(() => ok.style.display = "none", 3000);
}

function copyText() {
  const name = document.getElementById("memberName").value.trim() || "Miembro";
  const lines = [`🎸 FENÓMENOS – SET LIST (${name})\n`];
  songs.forEach((s, i) => lines.push(`${i+1}. ${s.title}  |  ${s.bpm ? s.bpm+" BPM" : "—"}  |  ${s.duration}`));
  lines.push(`\nDuración total: ${totalDur(songs)}`);
  navigator.clipboard.writeText(lines.join("\n")).then(showOk);
}

function exportImg() {
  const name = document.getElementById("memberName").value.trim() || "Miembro";
  const canvas = document.createElement("canvas");
  const W = 640, ROW = 46, HEADER = 110, FOOTER = 60;
  canvas.width = W;
  canvas.height = HEADER + songs.length * ROW + FOOTER;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, W, canvas.height);
  ctx.fillStyle = "#e94560"; ctx.fillRect(0, 0, W, 6);
  ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
  ctx.fillText("🎸 FENÓMENOS – SET LIST", W/2, 42);
  ctx.font = "15px Arial"; ctx.fillStyle = "#aaaacc";
  ctx.fillText(name, W/2, 66);
  ctx.fillStyle = "#555577"; ctx.fillRect(20, 80, W-40, 1);
  ctx.font = "12px Arial"; ctx.fillStyle = "#888";
  ctx.fillText(`${songs.length} temas · Duración total: ${totalDur(songs)}`, W/2, 98);

  songs.forEach((s, i) => {
    const y = HEADER + i * ROW;
    ctx.fillStyle = i%2===0 ? "#16213e" : "#0f3460"; ctx.fillRect(0, y, W, ROW);
    ctx.fillStyle = "#e94560"; ctx.font = "bold 13px Arial"; ctx.textAlign = "left";
    ctx.fillText(`${i+1}.`, 16, y+29);
    ctx.fillStyle = "#fff"; ctx.font = "13px Arial";
    ctx.fillText(s.title.length > 34 ? s.title.slice(0,32)+"…" : s.title, 38, y+29);
    ctx.fillStyle = "#aaaacc"; ctx.font = "11px Arial"; ctx.textAlign = "right";
    ctx.fillText(`${s.bpm ? s.bpm+" BPM" : "—"}  ·  ${s.duration}`, W-16, y+29);
  });

  const fy = HEADER + songs.length * ROW + 20;
  ctx.fillStyle = "#555577"; ctx.fillRect(20, fy-10, W-40, 1);
  ctx.fillStyle = "#aaaacc"; ctx.font = "12px Arial"; ctx.textAlign = "center";
  ctx.fillText(`Duración total: ${totalDur(songs)}`, W/2, fy+12);

  const a = document.createElement("a");
  a.download = `setlist_fenomenos_${name.replace(/\s+/g,"_")}.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
  showOk();
}

document.addEventListener("DOMContentLoaded", () => render());
</script>
</body>
</html>
